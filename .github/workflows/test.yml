name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Node ${{ matrix.node }}${{ matrix.os == 'ubuntu-latest' && '' || format(' / {0}', matrix.os) }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is our stated floor. Test the floor and current LTS.
        node: [20, 22]
        os: [ubuntu-latest]
        include:
          # Smoke-test on Windows + macOS using current LTS to catch
          # platform issues before they bite downstream consumers.
          - node: 22
            os: windows-latest
          - node: 22
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Verify zero runtime dependencies
        run: |
          # The SDK is meant to ship with no runtime deps. If this ever
          # starts failing, someone added a dep they shouldn't have.
          test "$(node -e 'const p=require("./package.json"); console.log(Object.keys(p.dependencies||{}).length)')" = "0"
        shell: bash

      - name: Run tests
        run: npm test
